<div class="db-bank-table">
  <table>
    <thead>
      <tr>
        <th>所属公司</th>
        <th>银行号码</th>
        <th>所属</th>
        <th>银行卡图片</th>
        <th>卡片状态</th>
        <th>国家</th>
      </tr>
    </thead>
    <tbody>
      {% set rows = rows or [] %} {% if rows|length == 0 %}
      <tr>
        <td colspan="6" class="muted">暂无数据。</td>
      </tr>
      {% else %} {% for r in rows %}
      <tr>
        <td>
          <a
            href="/ui/companies/{{ r.id }}"
            style="text-decoration: none; color: inherit"
          >
            {{ r.company_name or ('公司 #' ~ r.id) }}
          </a>
        </td>
        <td>-</td>
        <td>-</td>
        <td>-</td>
        <td>-</td>
        <td>{{ r.country or '-' }}</td>
      </tr>
      {% endfor %} {% endif %}
    </tbody>
  </table>
</div>
