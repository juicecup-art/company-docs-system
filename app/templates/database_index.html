{% extends "base.html" %} {% block title %}斯本贸易 - 数据库管理{% endblock %}
{% block crumb %}数据库管理{% endblock %} {% block content %}

<style>
  .db-card {
    margin-left: -10px;
  }

  .page-head {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .db-layout {
    display: flex;
    margin-top: 14px;
  }

  .db-sidebar {
    width: 200px;
    border-right: 1px solid var(--border);
    padding: 8px 0;
    padding-left: 6px;
  }

  .db-nav-item {
    display: block;
    width: 100%;
    padding: 8px 14px;
    font-size: 15px;
    font-weight: 600;
    border-radius: 999px;
    cursor: pointer;
    border: none;
    background: transparent;
    text-align: left;
    color: var(--text-main);
    margin-top: 0;
    margin-bottom: 6px;
  }

  .db-nav-item:hover {
    background: rgba(37, 99, 235, 0.06);
  }

  .db-nav-item.active {
    background: rgba(37, 99, 235, 0.1);
    color: #2563eb;
    font-weight: 700;
    box-shadow: 0 4px 10px rgba(15, 23, 42, 0.12);
  }

  .db-main {
    flex: 1;
    padding: 12px 16px;
    min-height: 310px;
    max-height: 570px;
    overflow-y: auto;
  }

  table thead th {
    font-size: 12px;
    font-weight: 700;
    color: rgba(15, 23, 42, 0.55);
    background: rgba(15, 23, 42, 0.03);
    border-bottom: 1px solid rgba(15, 23, 42, 0.12);
  }

  table tbody td {
    font-size: 13px;
    color: rgba(15, 23, 42, 0.75);
    border-bottom: 1px solid rgba(15, 23, 42, 0.08);
    vertical-align: middle;
  }

  table tbody tr:hover {
    background: rgba(37, 99, 235, 0.03);
  }

  .t-code {
    font-weight: 700;
  }
  .t-name {
    font-size: 14px;
    font-weight: 800;
  }
  .t-muted {
    color: rgba(15, 23, 42, 0.6);
  }

  td.actions {
    text-align: right;
    white-space: nowrap;
  }

  .btn-danger {
    background: #fff;
    border: 1px solid rgba(220, 38, 38, 0.25);
    color: #b00020;
  }

  .btn-danger:hover {
    background: rgba(220, 38, 38, 0.06);
    border-color: rgba(220, 38, 38, 0.35);
  }

  .action-menu {
    position: relative;
    display: inline-block;
  }

  .action-menu summary {
    list-style: none;
    cursor: pointer;
    font-size: 12px;
    padding: 6px 8px;
  }

  .action-menu summary::marker,
  .action-menu summary::-webkit-details-marker {
    display: none;
  }

  .action-menu .menu {
    position: absolute;
    right: 0;
    top: calc(100% + 8px);
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: 0 12px 32px rgba(15, 23, 42, 0.14);
    padding: 6px;
  }

  .action-menu .menu a {
    display: block;
    padding: 6px 10px;
    font-size: 13px;
    font-weight: 700;
    text-decoration: none;
    border-radius: 10px;
  }

  .action-menu .menu a:hover {
    background: rgba(37, 99, 235, 0.06);
  }
</style>

<div class="card db-card">
  <!-- Header -->
  <div class="page-head">
    <h2 style="margin: 0">数据库管理</h2>
    <span style="flex: 1"></span>
    <form
      method="get"
      action="/ui/database"
      style="display: flex; gap: 8px; align-items: center"
    >
      <input
        type="text"
        name="q"
        value="{{ (q.q if q and q.q is defined else '') }}"
        placeholder="搜索公司名称"
        style="
          width: 340px;
          padding: 8px 10px;
          border: 1px solid var(--border);
          border-radius: 12px;
          outline: none;
          font-size: 13px;
        "
      />
      <button class="btn" type="submit">🔍 搜索</button>
      {% if q and q.q %}
      <a
        class="btn btn-danger"
        href="/ui/database"
        style="text-decoration: none"
        >清空</a
      >
      {% endif %}
    </form>
  </div>

  <div class="db-layout">
    <div class="db-sidebar">
      <button type="button" class="db-nav-item active">银行卡汇总</button>
      <button type="button" class="db-nav-item">德国包装法汇总</button>
      <button type="button" class="db-nav-item">法国包装法汇总</button>
      <button type="button" class="db-nav-item">紫鸟汇总</button>
      <button type="button" class="db-nav-item">平台店铺链接汇总</button>
      <button type="button" class="db-nav-item">域名汇总</button>
    </div>
    <div class="db-main"></div>
  </div>
</div>

<script>
  // 点击页面其它地方自动收起菜单
  document.addEventListener('click', function (e) {
    document.querySelectorAll('.action-menu[open]').forEach(function (menu) {
      if (!menu.contains(e.target)) {
        menu.removeAttribute('open')
      }
    })
  })

  document.addEventListener('DOMContentLoaded', function () {
    var navItems = document.querySelectorAll('.db-nav-item')
    var main = document.querySelector('.db-main')
    var navMaxHeight = 0
    var searchForm = document.querySelector('.page-head form')

    navItems.forEach(function (item) {
      if (item.offsetHeight > navMaxHeight) {
        navMaxHeight = item.offsetHeight
      }

      item.addEventListener('click', function () {
        var label = item.textContent.trim()
        try {
          localStorage.setItem('dbActiveTab', label)
        } catch (e) {}
        navItems.forEach(function (el) {
          el.classList.remove('active')
        })
        item.classList.add('active')

        if (!main) return
        main.innerHTML = ''
        if (label === '银行卡汇总') {
          var search = window.location.search || ''
          fetch('/ui/database/bank' + search, { headers: { 'X-Partial': '1' } })
            .then(function (res) {
              return res.text()
            })
            .then(function (html) {
              main.innerHTML = html
              var table = main.querySelector('table')
              if (table && navMaxHeight > 0) {
                var ths = table.querySelectorAll('thead th')
                ths.forEach(function (th) {
                  th.style.height = navMaxHeight + 'px'
                  th.style.verticalAlign = 'middle'
                })
                table.style.marginTop = '-3px'
              }
            })
            .catch(function () {
              main.textContent = '加载银行卡汇总失败'
            })
        } else {
          var placeholder = document.createElement('div')
          placeholder.style.color = 'var(--muted)'
          placeholder.style.fontSize = '13px'
          placeholder.textContent = '这里以后展示“' + label + '”的内容'
          main.appendChild(placeholder)
        }
      })
    })

    if (searchForm) {
      searchForm.addEventListener('submit', function (e) {
        var active = document.querySelector('.db-nav-item.active')
        if (!active) return
        var label = active.textContent.trim()
        if (label !== '银行卡汇总') {
          e.preventDefault()
        }
      })
    }

    if (navItems.length > 0) {
      var saved = null
      try {
        saved = localStorage.getItem('dbActiveTab')
      } catch (e) {}

      var target = null
      if (saved) {
        navItems.forEach(function (item) {
          var label = item.textContent.trim()
          if (!target && label === saved) {
            target = item
          }
        })
      }

      ;(target || navItems[0]).click()
    }
  })
</script>

{% endblock %}
